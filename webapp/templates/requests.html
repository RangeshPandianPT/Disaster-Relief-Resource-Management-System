{% extends "base.html" %}

{% block title %}Requests{% endblock %}

{% block content %}
<div class="page-container">
    <div class="page-header">
        <h1 class="page-title">Resource Requests</h1>
        <div class="page-actions">
            <select id="status-filter" class="filter-select" onchange="loadRequests()">
                <option value="">All Status</option>
                <option value="Pending">Pending</option>
                <option value="Approved">Approved</option>
                <option value="Fulfilled">Fulfilled</option>
                <option value="Partially_Fulfilled">Partially Fulfilled</option>
            </select>
            <select id="urgency-filter" class="filter-select" onchange="loadRequests()">
                <option value="">All Urgency</option>
                <option value="Critical">Critical</option>
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
            </select>
        </div>
    </div>
    
    <div class="table-container">
        <table class="data-table" id="requests-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Area</th>
                    <th>Resource</th>
                    <th>Quantity</th>
                    <th>Urgency</th>
                    <th>Status</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="requests-body">
                <tr><td colspan="7" class="loading">Loading requests...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Suggestion Modal -->
<div id="suggest-modal" class="modal hidden">
    <div class="modal-content" style="max-width: 600px;">
        <button class="modal-close" onclick="closeSuggestModal()">&times;</button>
        <h2>Smart Allocation Suggestion</h2>
        <div id="suggest-body">
            <p class="loading">Calculating best allocation path...</p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadRequests() {
    const status = document.getElementById('status-filter').value;
    const urgency = document.getElementById('urgency-filter').value;
    
    let url = '/api/requests?';
    if (status) url += `status=${status}&`;
    if (urgency) url += `urgency=${urgency}`;
    
    try {
        const res = await fetch(url);
        const requests = await res.json();
        
        const tbody = document.getElementById('requests-body');
        
        if (requests.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="no-data">No requests found.</td></tr>';
            return;
        }
        
        tbody.innerHTML = requests.map(r => `
            <tr>
                <td>${r.request_id}</td>
                <td>${r.area_name}</td>
                <td>${r.resource_name}</td>
                <td>${formatNumber(r.quantity_requested)} ${r.unit}</td>
                <td>
                    <span class="urgency-badge ${r.urgency.toLowerCase()}">
                        ${getUrgencyIcon(r.urgency)} ${r.urgency}
                    </span>
                </td>
                <td>
                    <span class="status-pill ${r.status.toLowerCase()}">
                        ${getStatusIcon(r.status)} ${r.status.replace('_', ' ')}
                    </span>
                </td>
                <td>${r.request_date}</td>
                <td>
                    ${r.status === 'Pending' || r.status === 'Partially_Fulfilled' ? 
                        `<button onclick="getSmartSuggestion(${r.request_id})" class="view-btn" style="padding: 0.25rem 0.5rem; font-size: 0.8rem; border-color: var(--accent-info); color: var(--accent-info);">Smart Allocate</button>` 
                        : '-'}
                </td>
            </tr>
        `).join('');
        
    } catch (error) {
        console.error('Error loading requests:', error);
    }
}

function getUrgencyIcon(urgency) {
    return {'Critical': 'Critical', 'High': 'High', 'Medium': 'Medium', 'Low': 'Low'}[urgency] || 'Unknown';
}

function getStatusIcon(status) {
    return {
        'Pending': 'Pending', 'Approved': 'Approved', 'Fulfilled': 'Fulfilled',
        'Partially_Fulfilled': 'Partial', 'Rejected': 'Rejected'
    }[status] || 'Unknown';
}

function formatNumber(num) {
    return num?.toLocaleString() || '0';
}

async function getSmartSuggestion(requestId) {
    const modal = document.getElementById('suggest-modal');
    const body = document.getElementById('suggest-body');
    
    modal.classList.remove('hidden');
    body.innerHTML = '<p class="loading">Analyzing inventory and calculating best allocation...</p>';
    
    try {
        const res = await fetch(`/api/allocate_suggest/${requestId}`);
        const data = await res.json();
        
        if (data.error) {
            body.innerHTML = `<p class="no-data" style="color:var(--accent-danger)">${data.error}</p>`;
            return;
        }
        
        if (data.suggestions && data.suggestions.length > 0) {
            const best = data.suggestions[0];
            body.innerHTML = `
                <div class="alert-card ${best.confidence === 'High' ? 'ok' : 'warning'}" style="margin-bottom: 1rem;">
                    <div class="alert-icon">Recommendation</div>
                    <div class="alert-content">
                        <strong>AI Recommendation</strong><br>
                        Allocate from <strong>${best.warehouse}</strong>
                    </div>
                </div>
                
                <p><strong>Resource:</strong> ${data.resource}</p>
                <p><strong>Quantity Needed:</strong> ${data.quantity_still_needed}</p>
                
                <h3 style="margin-top:1.5rem; font-size:1rem;">Available Options</h3>
                <table class="data-table" style="margin-top:0.5rem;">
                    <thead>
                        <tr>
                            <th>Warehouse</th>
                            <th>Stock Available</th>
                            <th>Suggested Alloc.</th>
                            <th>Confidence</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.suggestions.map(s => `
                            <tr>
                                <td>${s.warehouse}</td>
                                <td>${s.available}</td>
                                <td><strong>${s.suggested_allocation}</strong></td>
                                <td><span class="status-pill ${s.confidence === 'High' ? 'ok' : 'low'}">${s.confidence}</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
                <div style="margin-top: 1.5rem; display: flex; gap: 1rem; justify-content: flex-end;">
                    <button class="view-btn" onclick="closeSuggestModal()">Close</button>
                    <button class="view-btn active" onclick="alert('Allocation executed (Simulated)')">Execute Best Match</button>
                </div>
            `;
        } else {
             body.innerHTML = `<div class="alert-card warning">
                     <div class="alert-icon">Warning</div>
                <div class="alert-content">No sufficient inventory found across all warehouses for this request.</div>
             </div>`;
        }
    } catch (error) {
        body.innerHTML = `<p class="no-data" style="color:var(--accent-danger)">Error fetching suggestion</p>`;
    }
}

function closeSuggestModal() {
    document.getElementById('suggest-modal').classList.add('hidden');
}

document.addEventListener('DOMContentLoaded', loadRequests);
</script>
{% endblock %}
